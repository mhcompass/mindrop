# Serves the SPA and proxies /api to the tracker service on the compose
# network. Same-origin, so the browser never needs CORS.
server {
    listen 46720;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Resolving the `api` name through a variable (below)
    # defers lookup to request time, so the web container starts cleanly even if
    # the api isn't up yet — instead of nginx aborting at boot on an unknown
    # upstream and crash-looping.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Tracker API — proxied to the api service (compose DNS name `api`).
    location /api/ {
        set $tracker_api api;
        # Variable upstream needs the URI passed explicitly; $request_uri keeps
        # the full original /api/... path + query intact.
        proxy_pass http://$tracker_api:46721$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE / live event streams: stream immediately, hold long-lived connections.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
    }

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The entry document must never be cached, or browsers keep loading the
    # previous build's bundle after a rebuild. SPA fallback lives here too.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
