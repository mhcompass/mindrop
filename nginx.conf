# Serves the SPA and proxies /api to the tracker service on the compose
# network. Same-origin, so the browser never needs CORS.
server {
    listen 46720;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tracker API — proxied to the api service (compose DNS name `api`).
    # No trailing slash on proxy_pass keeps the full /api/... path intact.
    location /api/ {
        proxy_pass http://api:46721;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The entry document must never be cached, or browsers keep loading the
    # previous build's bundle after a rebuild. SPA fallback lives here too.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
