# Tailscale sidecar — publishes the Mindrop stack on your tailnet as
# https://mindrop.<your-tailnet>.ts.net (its own MagicDNS node named "mindrop"),
# with automatic HTTPS via Tailscale Serve. Private to the tailnet (not Funnel).
#
# Prereqs (Tailscale admin console, one-time):
#   - DNS  -> enable MagicDNS
#   - DNS  -> enable HTTPS Certificates
#   - Keys -> generate an auth key (reusable; tag it e.g. tag:mindrop if you use ACL tags)
#
# Run on spark (where the repo lives):
#   export TS_AUTHKEY=tskey-auth-xxxxxxxx
#   docker compose -f docker-compose.yml -f docker-compose.tailscale.yml \
#       --profile production up -d --build
#
# The mindrop node appears in your tailnet within a few seconds; the TLS cert is
# provisioned on first request. Then open https://mindrop.<your-tailnet>.ts.net .
#
# Mindrop is single-origin (nginx proxies /api -> the api service), so unlike
# Saga there is no public API URL to bake into the build — nothing extra to set.

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: mindrop-tailscale
    hostname: mindrop
    restart: unless-stopped
    environment:
      # Auth key is required; the :? makes compose fail fast if it's unset.
      TS_AUTHKEY: ${TS_AUTHKEY:?set TS_AUTHKEY to a Tailscale auth key}
      # MagicDNS node name -> https://mindrop.<tailnet>.ts.net
      TS_HOSTNAME: mindrop
      TS_STATE_DIR: /var/lib/tailscale
      # Userspace networking: no NET_ADMIN / /dev/net/tun needed, and it
      # coexists cleanly with spark's host tailscaled.
      TS_USERSPACE: "true"
      # Reverse-proxy config (proxies :443 -> the web container on :46720).
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale/mindrop.serve.json:/config/serve.json:ro
    depends_on:
      - web
    profiles:
      - production

volumes:
  tailscale_state:
